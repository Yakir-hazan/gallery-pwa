<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#060610" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="גלריה" />
  <title>גלריה — גיבוי תמונות</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ─── AUTH SCREEN ─── -->
<div id="screen-auth" class="screen active">
  <div class="auth-bg">
    <div class="auth-orb orb1"></div>
    <div class="auth-orb orb2"></div>
    <div class="auth-orb orb3"></div>
  </div>
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/><path d="M13 25l5-6 4 4 3-4 5 6H13z" fill="currentColor" opacity=".9"/><circle cx="27" cy="16" r="2.5" fill="currentColor"/></svg>
      </div>
      <h1 class="brand-name">גלריה</h1>
      <p class="brand-sub">גיבוי תמונות חכם</p>
    </div>

    <div id="auth-tabs" class="tab-row">
      <button class="tab active" data-tab="login">כניסה</button>
      <button class="tab" data-tab="register">הרשמה</button>
    </div>

    <form id="auth-form" autocomplete="off">
      <div class="field">
        <label>אימייל</label>
        <input type="email" id="auth-email" placeholder="you@example.com" required />
      </div>
      <div class="field">
        <label>סיסמה</label>
        <input type="password" id="auth-password" placeholder="••••••••" required />
      </div>
      <div class="field hidden" id="field-name">
        <label>שם מלא</label>
        <input type="text" id="auth-name" placeholder="ישראל ישראלי" />
      </div>
      <button type="submit" class="btn-primary btn-full" id="auth-submit">כניסה</button>
      <p id="auth-error" class="error-msg hidden"></p>
    </form>

    <p class="demo-note">💡 לדמו: כל אימייל + סיסמה (6+ תווים)</p>
  </div>
</div>

<!-- ─── MAIN APP SCREEN ─── -->
<div id="screen-app" class="screen">

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <svg class="header-icon" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/><path d="M13 25l5-6 4 4 3-4 5 6H13z" fill="currentColor" opacity=".9"/><circle cx="27" cy="16" r="2.5" fill="currentColor"/></svg>
        <span>גלריה</span>
      </div>
      <div class="header-actions">
        <button id="btn-gallery" class="icon-btn" title="תמונות מגובות">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button id="btn-logout" class="icon-btn" title="יציאה">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Stats bar -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat">
      <span class="stat-val" id="stat-total">0</span>
      <span class="stat-lbl">תמונות</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-val" id="stat-done">0</span>
      <span class="stat-lbl">מגובות</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-val" id="stat-fail">0</span>
      <span class="stat-lbl">נכשלו</span>
    </div>
    <div class="stat-sep"></div>
    <div class="stat">
      <span class="stat-val" id="stat-size">0 MB</span>
      <span class="stat-lbl">גודל</span>
    </div>
  </div>

  <!-- Overall Progress -->
  <div class="overall-progress" id="overall-progress" style="display:none">
    <div class="progress-header">
      <span id="progress-label">מעלה...</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="action-zone">
    <input type="file" id="file-input" multiple accept="image/*" style="display:none" />
    <button class="btn-primary btn-big" id="btn-pick">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      בחר תמונות לגיבוי
    </button>
    <button class="btn-secondary btn-big hidden" id="btn-resume">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="5,3 19,12 5,21"/></svg>
      המשך גיבוי
    </button>
    <button class="btn-ghost btn-big hidden" id="btn-clear">נקה הכל</button>
  </div>

  <!-- Offline banner -->
  <div class="offline-banner hidden" id="offline-banner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
    אין חיבור — הקבצים יועלו כשתחזור לאוויר
  </div>

  <!-- File list -->
  <div class="file-list-wrap">
    <div class="file-list-header hidden" id="file-list-header">
      <span>קבצים</span>
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">הכל</button>
        <button class="filter-btn" data-filter="pending">ממתין</button>
        <button class="filter-btn" data-filter="uploading">מעלה</button>
        <button class="filter-btn" data-filter="done">הצליח</button>
        <button class="filter-btn" data-filter="failed">נכשל</button>
      </div>
    </div>
    <ul class="file-list" id="file-list"></ul>
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="36" stroke="currentColor" stroke-width="1" opacity=".2"/><path d="M28 44l8-10 6 7 5-6 8 9H28z" fill="currentColor" opacity=".3"/><circle cx="52" cy="32" r="4" fill="currentColor" opacity=".3"/></svg>
      </div>
      <p>בחר תמונות כדי להתחיל גיבוי</p>
    </div>
  </div>

</div>

<!-- ─── GALLERY MODAL ─── -->
<div id="modal-gallery" class="modal hidden">
  <div class="modal-backdrop" id="modal-close"></div>
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h2 class="modal-title">תמונות מגובות</h2>
    <div class="gallery-grid" id="gallery-grid">
      <p class="gallery-empty">אין עדיין תמונות מגובות</p>
    </div>
  </div>
</div>

<!-- ─── INSTALL BANNER ─── -->
<div id="install-banner" class="install-banner hidden">
  <div class="install-content">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2v13M5 9l7 7 7-7M3 21h18"/></svg>
    <span>התקן את האפליקציה למסך הבית</span>
  </div>
  <div class="install-actions">
    <button id="btn-install" class="btn-primary btn-sm">התקן</button>
    <button id="btn-install-dismiss" class="btn-ghost btn-sm">אחר כך</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
